<!DOCTYPE html>

<html >
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/favicon.png">


<title>HubSpot Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff5c35,#ff8a65,#ff5c35);
background-size:300% 300%;
animation:bgMove 8s infinite alternate;
}

@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

.main-container{
width:850px;
height:520px;
background:white;
border-radius:12px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
display:flex;
overflow:hidden;
}


.left-panel{
width:45%;
background:#ff5c35;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
text-align:center;
}

.left-panel h1{
margin-bottom:10px;
}

.left-panel p{
font-size:14px;
opacity:0.9;
}


.right-panel{
width:55%;
padding:40px;
}

.form-title{
text-align:center;
margin-bottom:25px;
}

.input-group{
margin-bottom:15px;
}

.input-group input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:6px;
outline:none;
transition:0.3s;
}

.input-group input:focus{
border-color:#ff5c35;
box-shadow:0 0 5px rgba(255,92,53,0.3);
}

.btn{
width:100%;
padding:12px;
border:none;
background:#ff5c35;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#e24f2c;
transform:scale(1.03);
}

.switch{
text-align:center;
margin-top:15px;
}

.switch span{
color:#ff5c35;
font-weight:bold;
cursor:pointer;
}


.social-login{
text-align:center;
margin-top:20px;
}

.social-login i{
font-size:18px;
margin:0 8px;
padding:10px;
border-radius:50%;
background:#f1f1f1;
cursor:pointer;
transition:0.3s;
}

.social-login i:hover{
background:#ff5c35;
color:white;
}


#registerForm{
display:none;
}

</style>

</head>

<body>

<div class="main-container">

<div class="left-panel">

<h1>Welcome Back</h1>
<p>Login to manage your marketing, sales, and service tools all in one place.</p>

</div>

<div class="right-panel">

<h2 class="form-title" id="formTitle">Login</h2>

<form id="loginForm">

<div class="input-group">
<input type="email" placeholder="Email" required>
</div>

<div class="input-group">
<input type="password" placeholder="Password" required>
</div>

<button class="btn">Login</button>

<div class="switch">
Don't have an account? <span onclick="showRegister()">Register</span>
</div>

</form>

<form id="registerForm">

<div class="input-group">
<input type="text" placeholder="Full Name" required>
</div>

<div class="input-group">
<input type="email" placeholder="Email" required>
</div>

<div class="input-group">
<input type="password" placeholder="Password" required>
</div>

<button class="btn">Create Account</button>

<div class="switch">
Already have an account? <span onclick="showLogin()">Login</span>
</div>

</form>

<div class="social-login">
<p style="margin-bottom:10px;">or continue with</p>
<i class="fab fa-google"></i>
<i class="fab fa-facebook-f"></i>
<i class="fab fa-linkedin-in"></i>
</div>

</div>

</div>

<script>

function showRegister(){

document.getElementById("loginForm").style.display="none";
document.getElementById("registerForm").style.display="block";
document.getElementById("formTitle").innerText="Register";

}

function showLogin(){

document.getElementById("loginForm").style.display="block";
document.getElementById("registerForm").style.display="none";
document.getElementById("formTitle").innerText="Login";

}

</script>

</body>
</html>
